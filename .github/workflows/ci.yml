name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        if: runner.os == 'Linux'
        run: go test -race -count=1 ./...

      - name: Test
        if: runner.os == 'Windows'
        run: go test -count=1 ./...

      - name: Fuzz (short)
        if: runner.os == 'Linux'
        run: |
          go test -run '^$' -fuzz FuzzModuleConfigSetLevels -fuzztime 15s ./handler
          go test -run '^$' -fuzz FuzzRedactionHandlerHandle -fuzztime 15s ./handler
